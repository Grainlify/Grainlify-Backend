name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Vet, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        # TEST_DB_URL is intentionally left unset: DB-dependent integration tests
        # detect its absence and skip themselves rather than failing.
        run: go test -count=1 -cover ./...

      - name: Fuzz smoke run (XDR decode helpers)
        # Run each fuzz target for 10 s.  The corpus seeds in testdata/fuzz/
        # are replayed first; the fuzzer then mutates them for the remainder of
        # the time window.  A panic or t.Fatal in any target fails the build.
        # -run='^$' suppresses non-fuzz tests so the step is fast and focused.
        run: |
          for target in \
            FuzzDecodeScValInt64 \
            FuzzDecodeScValString \
            FuzzDecodeScValSymbol \
            FuzzDecodeScValAddress \
            FuzzDecodeScValStruct \
            FuzzDecodeScValRoundTrip; do
            echo "--- fuzzing $target ---"
            go test ./internal/soroban/... \
              -run='^$' \
              -fuzz="^${target}$" \
              -fuzztime=10s
          done
